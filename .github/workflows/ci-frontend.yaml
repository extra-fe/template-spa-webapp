name: CI - Frontend (Trivy scan)

# Required status check として安全に必須化できるよう、paths フィルタは
# ワークフローレベルではなくジョブレベル (changes ジョブ + if 条件) で行う。
# こうすると frontend を含まない PR でもワークフロー自体は起動し、各ジョブは
# skipped (= 必須チェックでは成功扱い) として報告されるため、必須チェックが
# 「Expected で永久 pending」になり PR がマージ不能になる問題を避けられる。
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor)
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect frontend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-frontend.yaml'

  trivy-scan:
    name: Trivy fs scan (deps + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true') && (github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor))
    outputs:
      vuln-high: ${{ steps.vuln-count.outputs.high }}
      vuln-critical: ${{ steps.vuln-count.outputs.critical }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy vulnerability scan (JSON for counts)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend/sandbox-frontend
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: json
          output: trivy-vuln.json

      - name: Parse vulnerability counts
        id: vuln-count
        run: |
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-vuln.json 2>/dev/null || echo 0)
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-vuln.json 2>/dev/null || echo 0)
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan (table + gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend/sandbox-frontend
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend/sandbox-frontend
          scanners: secret
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '1'
          format: table

  lint-typecheck:
    name: Frontend Lint & Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true') && (github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor))
    defaults:
      run:
        working-directory: frontend/sandbox-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.0
          cache: yarn
          cache-dependency-path: frontend/sandbox-frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: ESLint (no fix, fail on warnings)
        run: yarn lint:ci

      - name: Type check (tsc -b --noEmit)
        run: yarn typecheck

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, trivy-scan, lint-typecheck]
    if: always() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true') && (github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor))

    steps:
      - name: Set notification vars
        env:
          JOB_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$JOB_FAILED" == "true" ]]; then
            echo "RESULT=:x: Failed" >> "$GITHUB_ENV"
            echo "COLOR=danger" >> "$GITHUB_ENV"
          else
            echo "RESULT=:white_check_mark: Passed" >> "$GITHUB_ENV"
            echo "COLOR=good" >> "$GITHUB_ENV"
          fi

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ env.COLOR }}",
                  "mrkdwn_in": ["text"],
                  "text": "${{ env.RESULT }} *CI - Frontend (Trivy)*\n*Repo:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}` | *Commit:* `${{ github.sha }}`\n*Vulns (fixable):* CRITICAL: ${{ needs.trivy-scan.outputs.vuln-critical }}, HIGH: ${{ needs.trivy-scan.outputs.vuln-high }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                }
              ]
            }
