name: CI - Frontend (Trivy scan)

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-scan:
    name: Trivy fs scan (deps + secrets)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.actor == 'jinka1997'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy vulnerability scan (yarn.lock)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend/sandbox-frontend
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend/sandbox-frontend
          scanners: secret
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '1'
          format: table

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [trivy-scan]
    if: always() && (github.event_name != 'workflow_dispatch' || github.actor == 'jinka1997')

    steps:
      - name: Set notification vars
        env:
          JOB_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$JOB_FAILED" == "true" ]]; then
            echo "RESULT=:x: Failed" >> "$GITHUB_ENV"
            echo "COLOR=danger" >> "$GITHUB_ENV"
          else
            echo "RESULT=:white_check_mark: Passed" >> "$GITHUB_ENV"
            echo "COLOR=good" >> "$GITHUB_ENV"
          fi

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ env.COLOR }}",
                  "mrkdwn_in": ["text"],
                  "text": "${{ env.RESULT }} *CI - Frontend (Trivy)*\n*Repo:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}` | *Commit:* `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                }
              ]
            }
