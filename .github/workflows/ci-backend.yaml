name: CI - Backend (Trivy scan)

# Required status check として安全に必須化できるよう、paths フィルタは
# ワークフローレベルではなくジョブレベル (changes ジョブ + if 条件) で行う。
# こうすると backend を含まない PR でもワークフロー自体は起動し、各ジョブは
# skipped (= 必須チェックでは成功扱い) として報告されるため、必須チェックが
# 「Expected で永久 pending」になり PR がマージ不能になる問題を避けられる。
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  BACKEND_DIR: backend/sandbox-backend
  IMAGE_NAME: sandbox-backend:ci-${{ github.sha }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor)
    outputs:
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect backend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci-backend.yaml'

  trivy-fs:
    name: Trivy fs scan (deps + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true') && (github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor))
    outputs:
      vuln-high: ${{ steps.vuln-count.outputs.high }}
      vuln-critical: ${{ steps.vuln-count.outputs.critical }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy vulnerability scan (JSON for counts)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.BACKEND_DIR }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: json
          output: trivy-vuln.json

      - name: Parse vulnerability counts
        id: vuln-count
        run: |
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-vuln.json 2>/dev/null || echo 0)
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-vuln.json 2>/dev/null || echo 0)
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan (table + gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.BACKEND_DIR }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.BACKEND_DIR }}
          scanners: secret
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '1'
          format: table

  trivy-image:
    name: Trivy image scan (Docker build, no push)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true') && (github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor))
    outputs:
      vuln-high: ${{ steps.vuln-count.outputs.high }}
      vuln-critical: ${{ steps.vuln-count.outputs.critical }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (load to local daemon)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          file: ${{ env.BACKEND_DIR }}/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Trivy image scan (JSON for counts)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: json
          output: trivy-image.json
          trivyignores: ${{ env.BACKEND_DIR }}/.trivyignore

      - name: Parse vulnerability counts
        id: vuln-count
        run: |
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-image.json 2>/dev/null || echo 0)
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-image.json 2>/dev/null || echo 0)
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan (table + gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table
          trivyignores: ${{ env.BACKEND_DIR }}/.trivyignore

  lint-typecheck:
    name: Backend Lint & Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true') && (github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor))
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.0
          cache: yarn
          cache-dependency-path: ${{ env.BACKEND_DIR }}/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma Client
        # prisma.config.ts が DATABASE_URL を要求するためダミー値を渡す
        # (generate は DB 接続しない。Dockerfile と同じ値)
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: ESLint (no fix, fail on warnings)
        run: yarn lint:ci

      - name: Type check (tsc --noEmit)
        run: yarn typecheck

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, trivy-fs, trivy-image, lint-typecheck]
    if: always() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true') && (github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor))

    steps:
      - name: Set notification vars
        env:
          JOB_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$JOB_FAILED" == "true" ]]; then
            echo "RESULT=:x: Failed" >> "$GITHUB_ENV"
            echo "COLOR=danger" >> "$GITHUB_ENV"
          else
            echo "RESULT=:white_check_mark: Passed" >> "$GITHUB_ENV"
            echo "COLOR=good" >> "$GITHUB_ENV"
          fi

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ env.COLOR }}",
                  "mrkdwn_in": ["text"],
                  "text": "${{ env.RESULT }} *CI - Backend (Trivy)*\n*Repo:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}` | *Commit:* `${{ github.sha }}`\n*Vulns (fixable):* deps — CRITICAL: ${{ needs.trivy-fs.outputs.vuln-critical }}, HIGH: ${{ needs.trivy-fs.outputs.vuln-high }} | image — CRITICAL: ${{ needs.trivy-image.outputs.vuln-critical }}, HIGH: ${{ needs.trivy-image.outputs.vuln-high }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                }
              ]
            }
