name: CI - Backend (Trivy scan)

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yaml'
  workflow_dispatch:

permissions:
  contents: read

env:
  BACKEND_DIR: backend/sandbox-backend
  IMAGE_NAME: sandbox-backend:ci-${{ github.sha }}

jobs:
  trivy-fs:
    name: Trivy fs scan (deps + secrets)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor)
    outputs:
      vuln-high: ${{ steps.vuln-count.outputs.high }}
      vuln-critical: ${{ steps.vuln-count.outputs.critical }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy vulnerability scan (JSON for counts)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.BACKEND_DIR }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: json
          output: trivy-vuln.json

      - name: Parse vulnerability counts
        id: vuln-count
        run: |
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-vuln.json 2>/dev/null || echo 0)
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-vuln.json 2>/dev/null || echo 0)
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan (table + gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.BACKEND_DIR }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.BACKEND_DIR }}
          scanners: secret
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '1'
          format: table

  trivy-image:
    name: Trivy image scan (Docker build, no push)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor)
    outputs:
      vuln-high: ${{ steps.vuln-count.outputs.high }}
      vuln-critical: ${{ steps.vuln-count.outputs.critical }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (load to local daemon)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          file: ${{ env.BACKEND_DIR }}/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Trivy image scan (JSON for counts)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: json
          output: trivy-image.json
          trivyignores: ${{ env.BACKEND_DIR }}/.trivyignore

      - name: Parse vulnerability counts
        id: vuln-count
        run: |
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-image.json 2>/dev/null || echo 0)
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-image.json 2>/dev/null || echo 0)
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan (table + gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table
          trivyignores: ${{ env.BACKEND_DIR }}/.trivyignore

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [trivy-fs, trivy-image]
    if: always() && (github.event_name != 'workflow_dispatch' || contains(fromJson(vars.ALLOWED_DISPATCH_USERS), github.actor))

    steps:
      - name: Set notification vars
        env:
          JOB_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$JOB_FAILED" == "true" ]]; then
            echo "RESULT=:x: Failed" >> "$GITHUB_ENV"
            echo "COLOR=danger" >> "$GITHUB_ENV"
          else
            echo "RESULT=:white_check_mark: Passed" >> "$GITHUB_ENV"
            echo "COLOR=good" >> "$GITHUB_ENV"
          fi

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ env.COLOR }}",
                  "mrkdwn_in": ["text"],
                  "text": "${{ env.RESULT }} *CI - Backend (Trivy)*\n*Repo:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}` | *Commit:* `${{ github.sha }}`\n*Vulns (fixable):* deps — CRITICAL: ${{ needs.trivy-fs.outputs.vuln-critical }}, HIGH: ${{ needs.trivy-fs.outputs.vuln-high }} | image — CRITICAL: ${{ needs.trivy-image.outputs.vuln-critical }}, HIGH: ${{ needs.trivy-image.outputs.vuln-high }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                }
              ]
            }
